name: FaceMosaic
options:
  bundleIdPrefix: com.logan
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

fileGroups:
  - README.md

targets:
  FaceMosaic:
    type: application
    platform: [iOS, macOS]
    sources:
      - FaceMosaic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.logan.FaceMosaic
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: FaceMosaic
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "FaceMosaic needs access to your photo library to select and save photos."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "FaceMosaic needs permission to save edited photos to your library."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
      configs:
        debug:
          CODE_SIGN_ENTITLEMENTS: FaceMosaic/Resources/FaceMosaic.entitlements
    entitlements:
      path: FaceMosaic/Resources/FaceMosaic.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.personal-information.photos-library: true
